name: 🚀 Build & Release Android TV APK

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0.0, v1.2.3
  workflow_dispatch:   # Allow manual trigger
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Bump version (only on workflow_dispatch)
  # ─────────────────────────────────────────────────────────
  version_bump:
    name: 📦 Version Bump
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          VERSION="${LATEST#v}"
          IFS='.' read -ra PARTS <<< "$VERSION"
          MAJOR=${PARTS[0]:-0}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}
          
          case "${{ github.event.inputs.release_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "🏷️ New version: $NEW_TAG"

      - name: Update pubspec.yaml version
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          VERSION="${NEW_TAG#v}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          cat pubspec.yaml | grep version

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_tag }} [skip ci]"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin HEAD:main
          git push origin ${{ steps.bump.outputs.new_tag }}

  # ─────────────────────────────────────────────────────────
  # JOB 2: Build APK
  # ─────────────────────────────────────────────────────────
  build:
    name: 🔨 Build Android TV APK
    runs-on: ubuntu-latest
    needs: [version_bump]
    if: always() && (needs.version_bump.result == 'success' || github.event_name == 'push')
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      build_number: ${{ steps.get_version.outputs.build_number }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version_bump.outputs.new_tag || github.ref }}

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📋 Get version from pubspec
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD:-1}" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION+$BUILD"

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🧪 Run tests
        run: flutter test
        continue-on-error: true

      # ── Signing Setup ──────────────────────────────────
      - name: 🔑 Setup signing keystore
        if: env.KEY_STORE_BASE64 != ''
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
        run: |
          echo "$KEY_STORE_BASE64" | base64 --decode > android/app/keystore.jks
          echo "Keystore decoded successfully"

      - name: 📝 Create key.properties
        if: env.KEY_STORE_BASE64 != ''
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=$KEY_STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # ── Build APK ─────────────────────────────────────
      - name: 🏗️ Build Release APK (Android TV)
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --split-per-abi \
            --dart-define=FLUTTER_ENV=production

      - name: 🏗️ Build Universal APK
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --dart-define=FLUTTER_ENV=production

      - name: 📂 Rename APKs
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          BUILD="${{ steps.get_version.outputs.build_number }}"
          
          mkdir -p dist
          
          # Universal APK
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/flutter-iptv-${VERSION}-universal.apk"
          
          # Split APKs
          for ARCH in arm64-v8a armeabi-v7a x86_64; do
            if [ -f "build/app/outputs/flutter-apk/app-${ARCH}-release.apk" ]; then
              cp "build/app/outputs/flutter-apk/app-${ARCH}-release.apk" \
                 "dist/flutter-iptv-${VERSION}-${ARCH}.apk"
            fi
          done
          
          ls -lh dist/

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-iptv-apk-${{ steps.get_version.outputs.version }}
          path: dist/*.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # JOB 3: Create GitHub Release
  # ─────────────────────────────────────────────────────────
  release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: flutter-iptv-apk-${{ needs.build.outputs.version }}
          path: dist/

      - name: 📋 Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "## 🚀 Flutter IPTV v${VERSION}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### 📱 Downloads" >> CHANGELOG.md
          echo "| File | Platform |" >> CHANGELOG.md
          echo "|------|---------|" >> CHANGELOG.md
          echo "| \`flutter-iptv-${VERSION}-universal.apk\` | All Android TV devices |" >> CHANGELOG.md
          echo "| \`flutter-iptv-${VERSION}-arm64-v8a.apk\` | Modern Android TV (ARM64) |" >> CHANGELOG.md
          echo "| \`flutter-iptv-${VERSION}-armeabi-v7a.apk\` | Older Android TV (ARM32) |" >> CHANGELOG.md
          echo "| \`flutter-iptv-${VERSION}-x86_64.apk\` | Android TV emulators |" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### ✨ Features" >> CHANGELOG.md
          echo "- 📺 Android TV optimized UI with D-pad navigation" >> CHANGELOG.md
          echo "- 📋 M3U/M3U8 playlist support" >> CHANGELOG.md
          echo "- 🎬 Hardware-accelerated video playback via media_kit" >> CHANGELOG.md
          echo "- 🔍 Channel search with highlighted results" >> CHANGELOG.md
          echo "- ❤️ Favorites management" >> CHANGELOG.md
          echo "- 📂 Category-based channel organization" >> CHANGELOG.md
          echo "- ⚙️ Settings with playlist management" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "### 📝 Changes since $PREV_TAG" >> CHANGELOG.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -20 >> CHANGELOG.md
          fi
          
          cat CHANGELOG.md

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Flutter IPTV v${{ needs.build.outputs.version }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────
  # JOB 4: Notify (optional)
  # ─────────────────────────────────────────────────────────
  notify:
    name: 📣 Notify
    runs-on: ubuntu-latest
    needs: [build, release]
    if: always()
    steps:
      - name: ✅ Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
