name: flutter_iptv
description: A full-featured IPTV application optimized for Android TV.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Video Player - media_kit for best IPTV stream support
  media_kit: ^1.1.10+1
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.2

  # Navigation
  go_router: ^13.2.0

  # Networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # Storage
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Image
  cached_network_image: ^3.3.1

  # XML (for EPG)
  xml: ^6.5.0

  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  google_fonts: ^6.2.0

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5
  collection: ^1.18.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
